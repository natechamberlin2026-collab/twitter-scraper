name: Twitter Scraper Demo

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      type:
        description: 'Scrape type'
        type: choice
        required: true
        options:
          - user
          - search
          - hashtag
      target:
        description: 'Target (username, query, or hashtag)'
        type: string
        required: true
      max:
        description: 'Max tweets'
        type: string
        default: '50'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Run scraper
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
          HEADLESS: 'true'
          MAX_TWEETS: ${{ github.event.inputs.max || '50' }}
          OUTPUT_DIR: ./output
          OUTPUT_FORMAT: json
        run: |
          if [ "${{ github.event.inputs.type }}" = "user" ]; then
            node dist/index.ts user "${{ github.event.inputs.target }}" --max ${{ github.event.inputs.max || '50' }} --headless
          elif [ "${{ github.event.inputs.type }}" = "search" ]; then
            node dist/index.ts search "${{ github.event.inputs.target }}" --max ${{ github.event.inputs.max || '50' }} --headless
          elif [ "${{ github.event.inputs.type }}" = "hashtag" ]; then
            node dist/index.ts hashtag "${{ github.event.inputs.target }}" --max ${{ github.event.inputs.max || '50' }} --headless
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data-${{ github.run_id }}
          path: output/
          retention-days: 7

      - name: Summary
        run: |
          echo "## Scrape Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ github.event.inputs.type || 'scheduled' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: ${{ github.event.inputs.target || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files**: $(ls -la output/ | wc -l) items" >> $GITHUB_STEP_SUMMARY
          ls -la output/ >> $GITHUB_STEP_SUMMARY